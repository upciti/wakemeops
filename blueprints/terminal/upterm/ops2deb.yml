name: ghorg
matrix:
  architectures:
    - amd64
  versions:
    - 0.14.3
homepage: https://github.com/owenthereal/upterm
summary: Upterm tool for developers to share terminal sessions
description: |-
  Upterm is an open-source tool enabling developers to share terminal sessions
  securely over the web. It’s perfect for remote pair programming, accessing
  computers behind NATs/firewalls, remote debugging, and more.
fetch:
  url: https://github.com/owenthereal/upterm/releases/download/v{{version}}/upterm_linux_{{target}}.tar.gz
  targets:
    amd64: amd64
install:
  - upterm:/usr/bin/
