name: qq
matrix:
  architectures:
    - amd64
    - arm64
  versions:
    - 0.2.3
homepage: https://github.com/JFryy/qq
summary: jq inspired and gojq dependent interoperable config format transcoder with
  interactive querying
description: |-
  qq is a interoperable configuration format transcoder with jq query syntax
  powered by gojq.
  qq is multi modal, and can be used as a replacement for jq or be interacted
  with via a
  repl with autocomplete and realtime rendering preview for building queries
fetch: https://github.com/JFryy/qq/releases/download/v{{version}}/qq-v{{version}}-linux-{{arch}}.tar.gz
script:
  - qq-v{{version}}-linux-{{arch}}/qq:/usr/bin/
